name: CI

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.9", "3.10", "3.11"]

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install numpy pandas scipy statsmodels matplotlib openpyxl scikit-learn arch

      - name: Check that all modules can be imported (syntax check)
        run: |
          cd src
          python -c "import config, data_loader, risk_factors, dynamics, pricing, risk_measures, backtesting, bonus, plots, main"
