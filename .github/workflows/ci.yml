name: CI

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install numpy pandas scipy statsmodels matplotlib openpyxl scikit-learn arch

      - name: Check that all modules can be imported
        run: |
          python -c "import config, data_loader, risk_factors, dynamics, pricing, risk_measures, backtesting, bonus, plots, main"
